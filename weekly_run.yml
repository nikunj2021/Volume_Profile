name: NSE Weekly Volume Profile

on:
  schedule:
    # Saturday 02:30 UTC = 08:00 IST (after Friday close, before Monday open)
    - cron: "30 2 * * 6"
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy openpyxl gspread google-auth requests pytz

      # ── 4. Write service account JSON from GitHub Secret ──────────────────
      - name: Write Google service account key
        env:
          GCLOUD_SA_KEY: ${{ secrets.GCLOUD_SA_KEY }}
        run: |
          echo "$GCLOUD_SA_KEY" > service_account.json

      # ── 5. Patch config.py with GitHub Secrets ────────────────────────────
      - name: Inject secrets into config.py
        env:
          GOOGLE_SHEET_ID:    ${{ secrets.GOOGLE_SHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import os, re

          path = "config.py"
          with open(path) as f:
              src = f.read()

          replacements = {
              'GOOGLE_SHEET_ID    = ""': f'GOOGLE_SHEET_ID    = "{os.environ["GOOGLE_SHEET_ID"]}"',
              'TELEGRAM_BOT_TOKEN = ""': f'TELEGRAM_BOT_TOKEN = "{os.environ["TELEGRAM_BOT_TOKEN"]}"',
              'TELEGRAM_CHAT_ID   = ""': f'TELEGRAM_CHAT_ID   = "{os.environ["TELEGRAM_CHAT_ID"]}"',
          }
          for old, new in replacements.items():
              src = src.replace(old, new)

          with open(path, "w") as f:
              f.write(src)
          print("config.py patched with secrets")
          EOF

      # ── 6. Step 1 — Daily volume profiles ─────────────────────────────────
      - name: Run volume_profile.py
        run: python volume_profile.py

      # ── 7. Step 2 — S/R levels + push SR Zones to Sheets ──────────────────
      - name: Run add_sr_levels.py
        run: python add_sr_levels.py

      # ── 8. Step 3 — Weekly profiles + push Weekly SR Zones to Sheets ──────
      - name: Run weekly_volume_profile.py
        run: python weekly_volume_profile.py

      # ── 9. Upload Excel files as GitHub artifacts (7-day retention) ────────
      - name: Upload Excel reports
        uses: actions/upload-artifact@v4
        with:
          name: volume-profile-reports-${{ github.run_number }}
          path: |
            volume_profile_daily.xlsx
            volume_profile_sr.xlsx
            volume_profile_weekly.xlsx
          retention-days: 7

      # ── 10. Commit Excel files back to repo (optional — comment out if not needed)
      - name: Commit Excel reports to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add volume_profile_daily.xlsx volume_profile_sr.xlsx volume_profile_weekly.xlsx || true
          git diff --staged --quiet || git commit -m "Weekly volume profile update $(date +'%Y-%m-%d')"
          git push || true
